# ============================================================
#  PRODUCTS  (demo seed data - 12 items)
#  --------------------------------------------------------
#  Field reference:
#   id              unique id, also used as the cart key
#   title           shown on cards / detail page
#   group           top-level landing bucket:
#                     sports | pokemon | tcg | supplies
#   category        fine-grained collection page slug
#                     (baseball, football, basketball, pokemon, tcg, supplies, ...)
#   type            sealed | graded | single | supplies  (drives the Graded page)
#   price           number, no symbol
#   image           path to placeholder svg (relative_url applied at render)
#   badge           corner label: SEALED | GRADED | SINGLE | SUPPLIES
#   grade           optional grade chip, e.g. "PSA 10"
#   stock           integer; <= 3 shows a low-stock note
#   featured        true -> appears in the homepage Featured grid
#   description     product detail copy
#   stripe_price_id Stripe Price ID. "price_DEMO_xxx" while in demo mode.
#                     Replace with real price_... ids when going live.
# ============================================================

