<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }} | {{ site.tagline }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_newlines }}">

  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }} | {{ site.tagline }}{% endif %}">
  <meta property="og:description" content="{{ page.description | default: site.description | strip_newlines }}">
  <meta property="og:image" content="{{ '/assets/images/gdm_logo.jpg' | absolute_url }}">
  <meta name="theme-color" content="#0A0A0A">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap">

  <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">

  <script>
    /* Config bridge: Liquid -> JS. Used by cart.js / checkout.js. */
    window.GM = {
      baseurl: "{{ site.baseurl }}",
      demoMode: {{ site.stripe.demo_mode | jsonify }},
      publishableKey: "{{ site.stripe.publishable_key }}",
      currency: "{{ site.currency_symbol }}",
      freeShipping: {{ site.business.free_shipping_threshold | jsonify }}
    };
  </script>
</head>
<body class="gm-body{% if page.body_class %} {{ page.body_class }}{% endif %}">
  <a class="gm-skip" href="#main">Skip to content</a>

  {% include header.html %}
  {% include nav.html %}

  <main id="main" class="gm-main">
    {{ content }}
  </main>

  {% include footer.html %}

  <!-- Toast region for cart / UI feedback -->
  <div class="gm-toast" data-toast role="status" aria-live="polite" hidden></div>

  <script src="{{ '/assets/js/cart.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/checkout.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/nav.js' | relative_url }}" defer></script>
</body>
</html>
