{%- comment -%}
  GAMEDAY MAVERICKS logo, rendered as an <img> of assets/images/gdm_logo.png.
  Included once by header.html, footer.html, and checkout-demo.html (include
  logo.svg with a class param). Display size comes from the .gm-logo CSS rules,
  so this single file controls the logo everywhere it appears.
{%- endcomment -%}
<img class="{{ include.class | default: 'gm-logo' }}"
     src="{{ '/assets/images/gdm_logo.jpg' | relative_url }}"
     alt="Gameday Mavericks Sports Cards and TCG"
     width="1424" height="720">
