  <text x="322" y="92" text-anchor="middle" dominant-baseline="middle"
        font-family="'Oswald', 'Arial Narrow', Impact, sans-serif"
        font-weight="700" font-size="98" letter-spacing="2" fill="#6E0917">GAMEDAY</text>
  <text x="320" y="89" text-anchor="middle" dominant-baseline="middle"
        font-family="'Oswald', 'Arial Narrow', Impact, sans-serif"
        font-weight="700" font-size="98" letter-spacing="2"
        fill="url(#gmSilverGrad)" stroke="#2A2A2A" stroke-width="1.5" paint-order="stroke">GAMEDAY</text>
  <polygon points="150,168 490,168 516,196 490,224 150,224 124,196"
