<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" role="img" aria-label="Gameday Mavericks Card Shop" preserveAspectRatio="xMidYMid meet">
  <title>Gameday Mavericks Card Shop</title>
  <defs>
    <linearGradient id="gmBannerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E63048"/>
      <stop offset="0.55" stop-color="#C8102E"/>
      <stop offset="1" stop-color="#9A0C24"/>
    </linearGradient>
    <linearGradient id="gmSilverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.5" stop-color="#EDEFF2"/>
      <stop offset="1" stop-color="#C2C7CE"/>
