  <text x="320" y="198" text-anchor="middle" dominant-baseline="middle"
        font-family="'Oswald', 'Arial Narrow', Impact, sans-serif"
        font-weight="600" font-size="42" letter-spacing="7" fill="#F5F5F5">MAVERICKS</text>
  <text x="320" y="258" text-anchor="middle" dominant-baseline="middle"
        font-family="'Oswald', 'Arial Narrow', Impact, sans-serif"
        font-weight="700" font-size="28" letter-spacing="12" fill="#C8102E">CARD SHOP</text>
